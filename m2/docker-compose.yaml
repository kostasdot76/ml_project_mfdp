services:
  app:
    build: ./app/
    env_file:
      - ./app/.env
    volumes:
      - app:/app
      - ./static:/app/static
      - ./.dvc:/app/.dvc:z
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
  web-proxy:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx:/etc/nginx
      - ./static:/usr/share/nginx/html/static
    ports:
      - 80:80
      - 443:443
    depends_on:
      - app
  rabbitmq:
    image: rabbitmq:management
    ports:
      - "5672:5672" # AMQP port
      - "15672:15672" # UI port
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: on-failure
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_port_connectivity" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    env_file:
      - ./app/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 2s
      timeout: 2s
      retries: 30

  ml-worker:
    build:
      context: ./app
      dockerfile: Dockerfile.worker
    env_file:
      - ./app/.env
    volumes:
      - app:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
volumes:
  postgres_data:
  rabbitmq_data:
  app:
    driver: local
    driver_opts:
      type: none
      device: ./app
      o: bind
