{% extends "base.html" %}

{% block title %}Create Prediction{% endblock %}

{% block content %}
<div class="prediction-container">
    <h1>Определение качества вина 🔮</h1>

    <!-- Вывод ошибок -->
    {% if errors %}
    <div class="alert alert-error">
        <ul>
            {% for error in errors %}
            <li>{{ error }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}

    <!-- Форма -->
    <form action="/predict" method="post" class="prediction-form" id="predictionForm">
        <!-- Выбор модели -->
        <div class="form-group">
            <label for="model_type">Model Type</label>
            <select name="model_type" id="model_type" required>
                <option value="">-- Select Model --</option>
                <option value="classification">classification</option>
                <option value="regression">regression</option>
            </select>
        </div>

        <div class="wine-params">
            <!-- Фиксированная кислотность -->
            <!-- fixed_acidity = st.number_input('Fixed Acidity', min_value=0.0, value=7.4, step=0.1) -->
            <div class="param-group">
                <label>Фиксированная кислотность (4.6-15.9):
                    <input type="range" name="fixed_acidity" min="4.6" max="15.9" step="0.1" value="7.4"
                        oninput="updateValue('fixed_acidity', this.value)">
                    <span id="fixed_acidity_value">7.4</span>
                </label>
            </div>

            <!-- Летучая кислотность -->
            <!-- volatile_acidity = st.number_input('Volatile Acidity', min_value=0.0, value=0.7, step=0.01) -->
            <div class="param-group">
                <label>Летучая кислотность (0.12-1.58):
                    <input type="range" name="volatile_acidity" min="0.12" max="1.58" step="0.01" value="0.70"
                        oninput="updateValue('volatile_acidity', this.value)">
                    <span id="volatile_acidity_value">0.70</span>
                </label>
            </div>

            <!-- Лимонная кислота -->
            <!-- citric_acid = st.number_input('Citric Acid', min_value=0.0, value=0.0, step=0.01) -->
            <div class="param-group">
                <label>Лимонная кислота (0.0-1.0):
                    <input type="range" name="citric_acid" min="0.0" max="1.0" step="0.01" value="0.00"
                        oninput="updateValue('citric_acid', this.value)">
                    <span id="citric_acid_value">0.00</span>
                </label>
            </div>

            <!-- Остаточный сахар -->
            <!-- residual_sugar = st.number_input('Residual Sugar', min_value=0.0, value=1.9, step=0.1) -->
            <div class="param-group">
                <label>Остаточный сахар (0.9-15.5):
                    <input type="range" name="residual_sugar" min="0.9" max="15.5" step="0.1" value="1.9"
                        oninput="updateValue('residual_sugar', this.value)">
                    <span id="residual_sugar_value">0.00</span>
                </label>
            </div>

            <!-- Хлорид -->
            <!-- chlorides = st.number_input('Chlorides', min_value=0.0, value=0.076, step=0.001) -->
            <div class="param-group">
                <label>Хлорид (0.012-0.611):
                    <input type="range" name="chlorides" min="0.012" max="0.611" step="0.001" value="0.076"
                        oninput="updateValue('chlorides', this.value)">
                    <span id="chlorides_value">0.00</span>
                </label>
            </div>

            <!-- диоксид серы -->
            <!-- free_sulfur_dioxide = st.number_input('Free Sulfur Dioxide', min_value=0, value=11, step=1) -->
            <div class="param-group">
                <label>Диоксид серы (1-72):
                    <input type="range" name="free_sulfur_dioxide" min="1" max="72" step="1" value="11"
                        oninput="updateValue('free_sulfur_dioxide', this.value)">
                    <span id="free_sulfur_dioxide_value">0.00</span>
                </label>
            </div>

            <!-- диоксид серы -->
            <!-- total_sulfur_dioxide = st.number_input('Total Sulfur Dioxide', min_value=0, value=34, step=1) -->
            <div class="param-group">
                <label>Общее количество диоксида серы (6-289) :
                    <input type="range" name="total_sulfur_dioxide" min="6" max="289" step="1" value="34"
                        oninput="updateValue('total_sulfur_dioxide', this.value)">
                    <span id="total_sulfur_dioxide_value">0.00</span>
                </label>
            </div>

            <!-- плотность -->
            <!-- density = st.number_input('Density', min_value=0.0, value=0.9978, step=0.0001) -->
            <div class="param-group">
                <label>Плотность (0.99-1.004) :
                    <input type="range" name="density" min="0.99007" max="1.00369" step="0.0001" value="0.9978"
                        oninput="updateValue('density', this.value)">
                    <span id="density_value">0.00</span>
                </label>
            </div>

            <!-- кислотность -->
            <!-- pH = st.number_input('pH', min_value=0.0, value=3.51, step=0.01) -->
            <div class="param-group">
                <label>Кислотность (2.74-4.01) :
                    <input type="range" name="pH" min="2.74" max="4.01" step="0.01" value="3.51"
                        oninput="updateValue('pH', this.value)">
                    <span id="pH_value">0.00</span>
                </label>
            </div>

            <!-- сульфаты -->
            <!-- sulphates = st.number_input('Sulphates', min_value=0.0, value=0.56, step=0.01) -->
            <div class="param-group">
                <label>Сульфаты (0.33-2.00) :
                    <input type="range" name="sulphates" min="0.33" max="2.0" step="0.01" value="0.56"
                        oninput="updateValue('sulphates', this.value)">
                    <span id="sulphates_value">0.00</span>
                </label>
            </div>

            <!-- алкоголь -->
            <!-- alcohol = st.number_input('Alcohol', min_value=0.0, value=9.4, step=0.1) -->
            <div class="param-group">
                <label>Алкоголь (8.4-14.9) :
                    <input type="range" name="alcohol" min="8.4" max="14.9" step="0.1" value="9.4"
                        oninput="updateValue('alcohol', this.value)">
                    <span id="alcohol_value">0.00</span>
                </label>
            </div>

            <!-- Добавьте остальные параметры по аналогии -->

        </div>

        <!-- Скрытое поле для JSON -->
        <input type="hidden" name="data" id="jsonData">

        <!-- Кнопка отправки -->
        <button type="submit" class="btn-submit">Create Prediction</button>
    </form>

    <!-- Навигация -->
    <div class="navigation-links">
        <a href="/predict/history">View History</a> |
        <a href="/">Back to Home</a>
    </div>
</div>

<script>
    function updateValue(param, value) {
        // Обновляем отображаемое значение
        document.getElementById(`${param}_value`).textContent =
            Number(value).toFixed(param === 'volatile_acidity' ? 2 : 1);

        // Формируем JSON
        const formData = new FormData(document.getElementById('predictionForm'));
        const params = {
            fixed_acidity: parseFloat(formData.get('fixed_acidity')),
            volatile_acidity: parseFloat(formData.get('volatile_acidity')),
            citric_acid: parseFloat(formData.get('citric_acid')),
            residual_sugar: parseFloat(formData.get('residual_sugar')),
            chlorides: parseFloat(formData.get('chlorides')),
            free_sulfur_dioxide: parseFloat(formData.get('free_sulfur_dioxide')),
            total_sulfur_dioxide: parseFloat(formData.get('total_sulfur_dioxide')),
            density: parseFloat(formData.get('density')),
            pH: parseFloat(formData.get('pH')),
            sulphates: parseFloat(formData.get('sulphates')),
            alcohol: parseFloat(formData.get('alcohol')),
        };

        document.getElementById('jsonData').value = JSON.stringify(params);
    }
</script>

{% endblock %}
